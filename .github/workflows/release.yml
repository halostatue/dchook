name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser:
    name: Build binaries with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write # Releases binary artifacts
      id-token: write # Keyless signing with cosign
      attestations: write # GitHub attestations
      artifact-metadada: write # GitHub attestations

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: v2.13.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest binaries
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksum.txt

  docker:
    name: Build and sign Docker image
    needs: goreleaser # Wait for binaries to be built
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/dchook-listener

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Releases a docker image with the webhook listener
      id-token: write # Keyless signing with cosign
      attestations: write # GitHub attestations

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download release binaries
        run: |
          mkdir -p dist/linux_amd64 dist/linux_arm64
          gh release download "${GITHUB_REF_NAME}" \
            --pattern 'dchook_Linux_x86_64.tar.gz' \
            --pattern 'dchook_Linux_arm64.tar.gz' \
            --dir /tmp
          tar -xzf /tmp/dchook_Linux_x86_64.tar.gz -C dist/linux_amd64 --strip-components=1 dchook_Linux_x86_64/dchook
          tar -xzf /tmp/dchook_Linux_arm64.tar.gz -C dist/linux_arm64 --strip-components=1 dchook_Linux_arm64/dchook
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=git-
          labels: |
            org.opencontainers.image.title=dchook Webhook Listener
            org.opencontainers.image.description=Secure webhook receiver for Docker Compose deployments
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: 1
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${BUILD_DIGEST}"

      - name: Attest image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
